name: Publish

# Publish @clipform/n8n-nodes-clipform to npm. This is a PUBLIC repo, so Actions
# minutes are free + unlimited, and npm provenance works (required for n8n
# verified community nodes from 2026-05-01).
#
# First run with dry_run=true (default) to validate packaging; re-run with
# dry_run=false to publish. Bump "version" in package.json before a real publish.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (pack + validate, do not publish)'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # --ignore-scripts: only n8n-workflow's types + typescript are needed to
      # build; skip the native isolated-vm build it would otherwise trigger.
      - run: npm install --ignore-scripts

      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
